    <script>
        // --- ROUTING LOGIC ---
        
        // Function to render view based on name (updates DOM only)
        function renderView(viewName) {
            const storeView = document.getElementById('view-store');
            const offerView = document.getElementById('view-offer');
            
            if (viewName === 'offer') {
                storeView.classList.add('hidden-view');
                offerView.classList.remove('hidden-view');
            } else {
                offerView.classList.add('hidden-view');
                storeView.classList.remove('hidden-view');
            }
            window.scrollTo(0, 0);
        }

        // Function to navigate (updates URL history + renders view)
        function navigateTo(viewName) {
            const path = viewName === 'offer' ? '/#offer' : '/';
            // Push state to browser history
            history.pushState({ view: viewName }, '', path);
            renderView(viewName);
        }

        // Handle Browser Back/Forward Buttons
        window.addEventListener('popstate', (event) => {
            // Determine view from state, or fallback to URL check
            const currentPath = window.location.pathname;
            const viewName = event.state?.view || (currentPath === '#offer' ? 'offer' : 'store');
            renderView(viewName);
        });

        // Initialize on Page Load
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            const initialView = currentPath === '/offer' ? 'offer' : 'store';
            
            // Set initial view
            renderView(initialView);
            
            // Replace initial history state so we can navigate back to it correctly
            history.replaceState({ view: initialView }, '', currentPath);
        });


        // --- OFFER PAGE LOGIC (From provided text file) ---
        
        // State
        let currentCheckoutUrl = 'https://pay.oxapay.com/13817770'; // Default URL
        const freeCheckoutUrl = 'https://smrturl.co/a/s255b9493e5/86?s1=';
        const correctCode = 'FREEIOS26';
        const defaultPrice = 499;
        const defaultOldPrice = 1099;

        // Logic Elements
        const discountInput = document.getElementById('discount');
        const currentPriceEl = document.getElementById('current-price');
        const oldPriceEl = document.getElementById('old-price');
        const btnText = document.getElementById('btn-text');
        const codeStatusIcon = document.getElementById('code-status-icon');

        // Discount Code Logic
        if (discountInput) {
            discountInput.addEventListener('input', function(e) {
                const val = e.target.value.trim().toUpperCase();
                
                if (val === correctCode) {
                    // Code Applied
                    currentCheckoutUrl = freeCheckoutUrl;
                    
                    // Update UI for Free
                    currentPriceEl.innerText = '$0.00';
                    currentPriceEl.classList.add('text-green-600');
                    currentPriceEl.classList.remove('text-gray-900');
                    
                    oldPriceEl.innerText = '$' + defaultPrice; // Show $499 crossed out
                    
                    btnText.innerText = 'Claim for Free';
                    
                    // Icon status
                    codeStatusIcon.classList.remove('fa-tag', 'text-gray-300');
                    codeStatusIcon.classList.add('fa-check-circle', 'text-green-500');
                } else {
                    // Code Invalid/Empty
                    currentCheckoutUrl = 'https://pay.oxapay.com/13817770';
                    
                    // Revert UI
                    currentPriceEl.innerText = '$' + defaultPrice;
                    currentPriceEl.classList.remove('text-green-600');
                    currentPriceEl.classList.add('text-gray-900');
                    
                    oldPriceEl.innerText = '$' + defaultOldPrice;
                    
                    btnText.innerText = 'Buy Now - $' + defaultPrice;

                    // Icon status
                    codeStatusIcon.classList.add('fa-tag', 'text-gray-300');
                    codeStatusIcon.classList.remove('fa-check-circle', 'text-green-500');
                }
            });
        }

        // Custom Dropdown Logic
        const dropdownOptions = document.getElementById('dropdown-options');
        const dropdownArrow = document.getElementById('dropdown-arrow');
        const countryInput = document.getElementById('country-input');
        const selectedCountryText = document.getElementById('selected-country-text');

        function toggleDropdown(e) {
            e.stopPropagation();
            const isHidden = dropdownOptions.classList.contains('hidden');
            if (isHidden) {
                dropdownOptions.classList.remove('hidden');
                dropdownOptions.classList.add('dropdown-enter');
                dropdownArrow.style.transform = 'rotate(180deg)';
                dropdownArrow.classList.add('text-brand-blue');
            } else {
                closeDropdown();
            }
        }

        function closeDropdown() {
            dropdownOptions.classList.add('hidden');
            dropdownOptions.classList.remove('dropdown-enter');
            dropdownArrow.style.transform = 'rotate(0deg)';
            dropdownArrow.classList.remove('text-brand-blue');
        }

        function selectCountry(name, code) {
            selectedCountryText.textContent = name;
            selectedCountryText.classList.remove('text-gray-400');
            selectedCountryText.classList.add('text-gray-900');
            countryInput.value = code;
            checkInputs();
            setTimeout(closeDropdown, 150);
        }

        document.addEventListener('click', (e) => {
            const container = document.getElementById('custom-dropdown-container');
            if (container && !container.contains(e.target)) {
                closeDropdown();
            }
        });

        // Form Validation Logic
        const inputs = document.querySelectorAll('.required-field');
        const addToCartBtn = document.getElementById('add-to-cart-btn');

        function checkInputs() {
            let allFilled = true;
            inputs.forEach(input => {
                if (!input.value.trim()) {
                    allFilled = false;
                }
            });

            if (allFilled) {
                addToCartBtn.disabled = false;
            } else {
                addToCartBtn.disabled = true;
            }
        }

        inputs.forEach(input => {
            if (input.type === 'text') {
                input.addEventListener('input', checkInputs);
            }
        });

        // Checkout Process
        function processCheckout() {
            if (addToCartBtn.disabled) return;

            const toast = document.getElementById('toast');
            
            // Show toast
            toast.classList.remove('translate-x-48', 'opacity-0');
            
            // Redirect logic
            setTimeout(() => {
                window.location.href = currentCheckoutUrl;
            }, 1500);
        }
    </script>
